name = "kalakritam-api-production"
main = "backend/src/app.js"
compatibility_date = "2024-01-01"

# Route the worker to api.kalakritam.in
[[routes]]
pattern = "api.kalakritam.in/*"
zone_name = "kalakritam.in"

# Environment variables
# Required (set via `wrangler secret put`):
# - DATABASE_URL: Neon PostgreSQL connection string
# - JWT_SECRET: strong random secret for token signing
#
# Optional (set via `wrangler secret put`):
# (none required — NODE_ENV is set in [vars] below)

# Non-secret environment variables
[vars]
NODE_ENV = "production"

[build]
command = ""

[env.production]
name = "kalakritam-api-production"
NODE_ENV = "production"

[env.staging]
name = "kalakritam-api-staging"
NODE_ENV = "staging"

# R2 bucket for image storage
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "kalakritam"

# No D1 database needed — using Neon directly via @neondatabase/serverless WebSocket
# No KV storage needed — no sample data fallback
